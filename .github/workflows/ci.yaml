name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart run bin/ripple.dart run format.ci

      - name: Analyze
        run: dart run bin/ripple.dart run analyze.ci

      - name: Test
        run: dart run bin/ripple.dart run test.ci
