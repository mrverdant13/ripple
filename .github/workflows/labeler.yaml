name: "Pull Request Labeler"
on:
  - pull_request_target

jobs:
  labeler:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Label pull request
        uses: actions/labeler@v6.1.0
        with:
          configuration-path: .github/labeler.yaml
          sync-labels: true
