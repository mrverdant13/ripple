name: ripple_cli
description: >
  Repo-agnostic CLI for discovering Dart packages and running commands or
  named scripts across a consumer repository via ripple.yaml.
version: 0.0.1-dev.1
repository: https://github.com/mrverdant13/ripple

environment:
  sdk: ^3.5.0

executables:
  ripple: ripple

dependencies:
  args: ^2.6.0
  checked_yaml: ^2.0.3
  glob: ^2.1.2
  json_annotation: ^4.9.0
  path: ^1.9.0
  pubspec_parse: ^1.3.0
  yaml: ^3.1.2

dev_dependencies:
  coverde: ^0.4.0
  lints: ^5.0.0
  test: ^1.25.8
