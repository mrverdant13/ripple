# Ripple dogfood config for this repository (single package at the repo root).
name: ripple

packages:
  # Broad include so discovery is exercised; excludes keep fixture decoys out.
  include:
    - '**'
  exclude:
    - test/fixtures/**
    - '**/example/**'
    - '**/fixtures/**'
    - '**/mold/**'

scripts:
  format.ci:
    run: dart format --set-exit-if-changed .

  analyze.ci:
    run: dart analyze --fatal-infos --fatal-warnings .

  # Root package is not matched by packages.include globs, so these use run:
  # (cwd = Ripple root) rather than exec: over discovered packages.
  test:
    run:
      - dart run coverde optimize-tests --include test/**_test.dart --output test/optimized_test.dart
      - dart test --color --coverage-path coverage/lcov.info --coverage-package ripple_cli --reporter expanded --test-randomize-ordering-seed random test/optimized_test.dart

  test.ci:
    run:
      - dart run coverde optimize-tests --include test/**_test.dart --output test/optimized_test.dart
      - dart test --coverage-path coverage/lcov.info --coverage-package ripple_cli --reporter expanded --test-randomize-ordering-seed random test/optimized_test.dart

  coverage.merge:
    run:
      - dart run coverde rm --no-dry-run $RIPPLE_ROOT_PATH/coverage/lcov.merged.info
      - dart run coverde transform --input coverage/lcov.info --output $RIPPLE_ROOT_PATH/coverage/lcov.merged.info --transformations relative=$RIPPLE_ROOT_PATH

  coverage.check:
    run: dart run coverde check --input $RIPPLE_ROOT_PATH/coverage/lcov.merged.info 100
