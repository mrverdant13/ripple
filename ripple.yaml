# Ripple dogfood config for this repository (single package at the repo root).
name: ripple

packages:
  # Broad include so discovery is exercised; excludes keep fixture decoys out.
  # `**` also selects the Ripple root when it is a package.
  include:
    - '**'
  exclude:
    - test/fixtures/**
    - '**/example/**'
    - '**/fixtures/**'
    - '**/mold/**'

scripts:
  format.ci:
    run: dart format --set-exit-if-changed .

  analyze.ci:
    run: dart analyze --fatal-infos --fatal-warnings .

  test:
    exec:
      - dart run coverde optimize-tests --include test/**_test.dart --output test/optimized_test.dart
      - dart test --color --coverage-path coverage/lcov.info --coverage-package $RIPPLE_PACKAGE_NAME --reporter expanded --test-randomize-ordering-seed random test/optimized_test.dart
    filters:
      dependsOn: [test]
      dirExists: [test]

  test.ci:
    exec:
      - dart run coverde optimize-tests --include test/**_test.dart --output test/optimized_test.dart
      - dart test --coverage-path coverage/lcov.info --coverage-package $RIPPLE_PACKAGE_NAME --reporter expanded --test-randomize-ordering-seed random test/optimized_test.dart
    filters:
      dependsOn: [test]
      dirExists: [test]

  coverage.merge:
    run:
      - dart run coverde rm --no-dry-run $RIPPLE_ROOT_PATH/coverage/lcov.merged.info
      - dart run bin/ripple.dart exec --file-exists coverage/lcov.info -- dart run coverde transform --input coverage/lcov.info --output $RIPPLE_ROOT_PATH/coverage/lcov.merged.info --transformations relative=$RIPPLE_ROOT_PATH

  coverage.check:
    run: dart run coverde check --input $RIPPLE_ROOT_PATH/coverage/lcov.merged.info 100
